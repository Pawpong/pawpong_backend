name: Deploy to Development Server (Mac Mini)

on:
    push:
        branches: [dev, develop]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile --network-timeout 1000000

            - name: Build
              env:
                  NODE_OPTIONS: '--max-old-space-size=3072'
              run: yarn build

            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p ${{ secrets.DEV_SERVER_PORT }} -H ${{ secrets.DEV_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

            - name: Verify remote prerequisites (rsync·pm2·yarn)
              run: |
                  SERVER="${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
                  PORT="${{ secrets.DEV_SERVER_PORT }}"
                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${PORT} ${SERVER} \
                    "command -v rsync >/dev/null || sudo apt-get install -y rsync; \
                     command -v pm2 >/dev/null || sudo npm install -g pm2; \
                     command -v yarn >/dev/null || sudo npm install -g yarn; \
                     rsync --version | head -1; pm2 --version; yarn --version"

            - name: Transfer artifacts to Mac Mini (rsync with tar fallback)
              run: |
                  SERVER="${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
                  PORT="${{ secrets.DEV_SERVER_PORT }}"
                  SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${PORT}"
                  REMOTE_DIR="/home/colding/pawpong_backend"

                  if rsync -avz --delete -e "ssh ${SSH_OPTS}" dist/ "${SERVER}:${REMOTE_DIR}/dist/" \
                     && rsync -avz -e "ssh ${SSH_OPTS}" package.json yarn.lock "${SERVER}:${REMOTE_DIR}/"; then
                    echo "✅ rsync 전송 성공"
                  else
                    echo "⚠️ rsync 실패 → tar+ssh fallback 시도"
                    tar czf - dist package.json yarn.lock | \
                      ssh ${SSH_OPTS% -p*} -p ${PORT} ${SERVER} \
                        "cd ${REMOTE_DIR} && rm -rf dist && tar xzf -"
                  fi

            - name: Install & Restart on Mac Mini
              run: |
                  SERVER="${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
                  PORT="${{ secrets.DEV_SERVER_PORT }}"

                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${PORT} ${SERVER} << 'EOF'
                    set -e
                    cd /home/colding/pawpong_backend

                    echo "[deploy] yarn install (프로덕션 의존성, 플랫폼 바이너리 포함)"
                    yarn install --production --frozen-lockfile --network-timeout 1000000

                    echo "[deploy] pm2 restart pawpong-backend"
                    pm2 restart pawpong-backend --update-env || pm2 start dist/main.js --name pawpong-backend \
                      --output /home/colding/pawpong.log --error /home/colding/pawpong.log --merge-logs --time
                    pm2 save --force

                    echo "[deploy] 앱 부팅 대기 + 헬스체크 (최대 150초 - Kafka retry 포함)"
                    HEALTH_OK=0
                    for i in $(seq 1 75); do
                      if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                        echo "✅ 헬스체크 통과 ($((i * 2))초 경과)"
                        HEALTH_OK=1
                        break
                      fi
                      sleep 2
                    done
                    if [ "$HEALTH_OK" != "1" ]; then
                      echo "❌ 150초 내에 헬스체크 응답 없음 - 최근 pm2 로그 40줄:"
                      pm2 logs pawpong-backend --lines 40 --nostream 2>&1 | tail -40
                      exit 1
                    fi
                  EOF

            - name: Remote health check (external HTTPS)
              run: |
                  for i in $(seq 1 12); do
                    RESP=$(curl -sf -o /dev/null -w "%{http_code}" https://dev-api.pawpong.kr/api/health || echo "fail")
                    if [ "$RESP" = "200" ]; then
                      echo "✅ 외부 헬스체크 성공 (HTTPS 200)"
                      exit 0
                    fi
                    echo "재시도 ($i/12) - response: $RESP"
                    sleep 5
                  done
                  echo "❌ 외부 헬스체크 실패"
                  exit 1

            - name: Discord Notification (Success)
              if: success()
              run: |
                  COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
                  COMMIT_AUTHOR=$(git log -1 --pretty=%an)
                  COMMIT_SHA=$(git rev-parse --short HEAD)

                  curl -H "Content-Type: application/json" -X POST \
                    -d "{
                      \"embeds\": [{
                        \"title\": \"✅ Dev 서버 배포 성공\",
                        \"description\": \"Dev 브랜치가 Mac Mini(ubuntu-pawpong)에 배포되었습니다.\",
                        \"color\": 5763719,
                        \"fields\": [
                          {\"name\": \"URL\", \"value\": \"https://dev-api.pawpong.kr\", \"inline\": true},
                          {\"name\": \"서버\", \"value\": \"Mac Mini (colding)\", \"inline\": true},
                          {\"name\": \"커밋\", \"value\": \"\`$COMMIT_SHA\` by $COMMIT_AUTHOR\", \"inline\": false},
                          {\"name\": \"메시지\", \"value\": \"$COMMIT_MSG\", \"inline\": false}
                        ],
                        \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                      }]
                    }" \
                    ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}

            - name: Discord Notification (Failure)
              if: failure()
              run: |
                  COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
                  COMMIT_AUTHOR=$(git log -1 --pretty=%an)
                  COMMIT_SHA=$(git rev-parse --short HEAD)

                  curl -H "Content-Type: application/json" -X POST \
                    -d "{
                      \"embeds\": [{
                        \"title\": \"❌ Dev 서버 배포 실패\",
                        \"description\": \"Dev 브랜치 배포 중 오류 발생.\",
                        \"color\": 15158332,
                        \"fields\": [
                          {\"name\": \"서버\", \"value\": \"Mac Mini (colding)\", \"inline\": true},
                          {\"name\": \"커밋\", \"value\": \"\`$COMMIT_SHA\` by $COMMIT_AUTHOR\", \"inline\": false},
                          {\"name\": \"메시지\", \"value\": \"$COMMIT_MSG\", \"inline\": false},
                          {\"name\": \"Actions 로그\", \"value\": \"[보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                        ],
                        \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                      }]
                    }" \
                    ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
